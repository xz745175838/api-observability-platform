apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topic
  namespace: vsan-observability
spec:
  # backoffLimit字段用于指定Job在失败后重试的最大次数。如果Pod执行失败且未达到该次数，Job会自动重试，直到成功或达到上限。12表示最多重试12次。
  backoffLimit: 12
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do
                echo "waiting for kafka..."
                sleep 3
              done
      containers:
        - name: create-topic
          image: apache/kafka:3.8.1
          command:
            - /bin/bash
            - -ec
            - |
              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server kafka:9092 \
                --create --if-not-exists \
                --topic vsan-api-logs \
                --partitions 3 \
                --replication-factor 1
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
