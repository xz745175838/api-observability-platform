# HorizontalPodAutoscaler for vsan-collector.
# Requires: metrics-server addon, container resources.requests in 05-collector.yaml.
#
# Note: numbered 10 because 08-grafana.yaml already exists in this repo.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vsan-collector
  namespace: vsan-observability
  labels:
    app: vsan-collector
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vsan-collector
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Min
