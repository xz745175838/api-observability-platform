apiVersion: v1
kind: Service
metadata:
  name: vsan-processor
  namespace: vsan-observability
  labels:
    app: vsan-processor
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8081
      targetPort: 8081
  selector:
    app: vsan-processor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vsan-processor
  namespace: vsan-observability
  labels:
    app: vsan-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vsan-processor
  template:
    metadata:
      labels:
        app: vsan-processor
    spec:
      initContainers:
        - name: wait-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka 9092; do sleep 2; done
        - name: wait-influx
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z influxdb 8086; do sleep 2; done
      containers:
        - name: processor
          image: vsan-processor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: vsan-api-logs
            - name: KAFKA_GROUP
              value: vsan-processor
            - name: METRICS_ADDR
              value: ":8081"
            - name: INFLUX_URL
              value: "http://influxdb:8086"
            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vsan-influx
                  key: admin-token
            - name: INFLUX_ORG
              valueFrom:
                secretKeyRef:
                  name: vsan-influx
                  key: org
            - name: INFLUX_BUCKET
              valueFrom:
                secretKeyRef:
                  name: vsan-influx
                  key: bucket
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
