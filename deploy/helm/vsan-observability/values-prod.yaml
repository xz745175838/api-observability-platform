# HA overlay for minikube lab / pre-prod — use with base values.yaml:
#
#   helm upgrade --install vsan ./deploy/helm/vsan-observability \
#     -n vsan-observability \
#     -f values.yaml -f values-prod.yaml \
#     --wait --timeout 20m
#
# Or: ./scripts/minikube-down.sh && ./scripts/minikube-up.sh
#
# Prerequisites (current file):
#   - >= 3 worker nodes for hard podAntiAffinity on collector/processor
#   - metrics-server enabled (HPA)
#   - Kafka: 1 broker (working pipeline on minikube; see comments below for real 3-broker prod)
#   - Multi-node minikube: build with `minikube image load` (see minikube-up.sh)

global:
  imagePullPolicy: IfNotPresent
  podAntiAffinity:
    enabled: true
    type: hard
    topologyKey: kubernetes.io/hostname

# ---------------------------------------------------------------------------
# Kafka — single broker (minikube / chaos lab)
# ---------------------------------------------------------------------------
# Real production 3-broker: use Strimzi or StatefulSet per broker, then set:
#   replicas: 3, defaultReplicationFactor: 3, minInsyncReplicas: 2,
#   topic.replicationFactor: 3, topic.minInsyncReplicas: 2
kafka:
  replicas: 1
  minInsyncReplicas: 1
  defaultReplicationFactor: 1
  podAntiAffinity:
    enabled: false
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  storage:
    logDirs: /tmp/kraft-combined-logs
  topic:
    enabled: true
    partitions: 12
    replicationFactor: 1
    minInsyncReplicas: 1

influxdb:
  replicas: 1
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

collector:
  replicas: 3
  service:
    type: ClusterIP
    nodePort: null
  podAntiAffinity:
    enabled: true
    type: hard
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  pdb:
    enabled: true
    minAvailable: 2
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 60

processor:
  replicas: 3
  podAntiAffinity:
    enabled: true
    type: hard
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

queryApi:
  replicas: 2
  service:
    type: ClusterIP
    nodePort: null
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

prometheus:
  replicas: 2
  service:
    type: ClusterIP
    nodePort: null
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

grafana:
  replicas: 2
  service:
    type: ClusterIP
    nodePort: null
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
