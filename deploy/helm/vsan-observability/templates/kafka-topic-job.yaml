{{- if and .Values.kafka.enabled .Values.kafka.topic.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init-topic
  namespace: {{ include "vsan-observability.namespace" . }}
  labels:
    {{- include "vsan-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.kafka.topic.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: kafka-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-kafka
          image: {{ .Values.global.initImage | quote }}
          {{- include "vsan-observability.resources" .Values.global.initContainerResources | nindent 10 }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.kafka.service.name }} {{ .Values.kafka.service.port }}; do
                echo "waiting for kafka..."
                sleep 3
              done
      containers:
        - name: create-topic
          image: {{ .Values.kafka.image | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              /opt/kafka/bin/kafka-topics.sh \
                --bootstrap-server {{ include "vsan-observability.kafka.brokers" . }} \
                --create --if-not-exists \
                --topic {{ .Values.kafka.topic.name }} \
                --partitions {{ .Values.kafka.topic.partitions }} \
                --replication-factor {{ .Values.kafka.topic.replicationFactor }} \
                --config min.insync.replicas={{ .Values.kafka.topic.minInsyncReplicas }}
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server {{ include "vsan-observability.kafka.brokers" . }} --list
{{- end }}
